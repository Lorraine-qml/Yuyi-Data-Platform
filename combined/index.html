<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教育管理系统 - 入口导航</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #001F3C, #0A2A4A);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    
    .container {
      text-align: center;
      padding: 40px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #00D4FF, #0A4D8C);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
    }
    
    .logo span {
      font-size: 36px;
      font-weight: 700;
      color: #001F3C;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 16px;
      color: #8C9AA6;
      margin-bottom: 50px;
    }
    
    .cards {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .card {
      width: 320px;
      padding: 30px;
      background: rgba(10, 26, 47, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: white;
    }
    
    .card:hover {
      border-color: rgba(0, 212, 255, 0.5);
      box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
      transform: translateY(-5px);
    }
    
    .card-icon {
      width: 60px;
      height: 60px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    
    .card h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    
    .card p {
      font-size: 14px;
      color: #8C9AA6;
      line-height: 1.6;
    }
    
    .card .arrow {
      margin-top: 20px;
      font-size: 20px;
      color: #00D4FF;
    }
    
    footer {
      position: absolute;
      bottom: 30px;
      font-size: 12px;
      color: #8C9AA6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span>智</span>
    </div>
    <h1>浦东新区教育管理系统</h1>
    <p class="subtitle">智能分析 · 数据驱动 · 科学决策</p>
    
    <div class="cards">
      <a href="./report/index.html" class="card">
        <div class="card-icon">📄</div>
        <h2>一校一档报告</h2>
        <p>张江高科实验学校档案报告预览<br>包含学校概况、核心指标、建筑明细等完整信息</p>
        <div class="arrow">→</div>
      </a>
      
      <a href="./dashboard/index.html" class="card">
        <div class="card-icon">📊</div>
        <h2>智能分析管理大屏</h2>
        <p>四大核心模块数据可视化<br>学位供需、校舍健康、配套同步、人口预测</p>
        <div class="arrow">→</div>
      </a>
    </div>
  </div>
  
  <footer>
    浦东新区教育管理系统 © 2026
  </footer>
</body>
</html>
